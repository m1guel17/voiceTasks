{% comment %}
Task card partial template.
Used as a reference — the JS createTaskCard() function generates
the same structure dynamically for the Kanban board.

Variables:
  task — a Task model instance
{% endcomment %}
<div class="task-card group rounded-xl border border-stone-200 bg-white p-3 shadow-card cursor-grab active:cursor-grabbing"
     data-task-id="{{ task.id }}"
     data-status="{{ task.status }}"
     data-priority="{{ task.priority }}"
     x-data="taskCard({{ task.id }}, '{{ task.title|escapejs }}', '{{ task.description|escapejs }}', '{{ task.priority }}')"
>
  <!-- Card header: title + delete -->
  <div class="flex items-start justify-between gap-2">
    <!-- Editable title -->
    <div class="flex-1 min-w-0" @dblclick="startEditing()">
      <p x-show="!editing" class="text-xs font-semibold text-stone-900 leading-snug line-clamp-2">{{ task.title }}</p>
      <input x-show="editing"
             x-model="editTitle"
             @keydown.enter="saveEdits()"
             @keydown.escape="cancelEditing()"
             @blur="saveEdits()"
             class="w-full rounded border border-blue-300 bg-blue-50 px-1.5 py-0.5 text-xs font-semibold text-stone-900 focus:outline-none"
             maxlength="80"
             type="text" />
    </div>

    <!-- Delete button -->
    <button @click="deleteCard()"
            class="opacity-0 group-hover:opacity-100 shrink-0 rounded p-0.5 text-stone-300 hover:text-red-500 transition-opacity mt-0.5"
            title="Delete task">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Description -->
  <div @dblclick="startEditing()">
    <p x-show="!editing && description" class="mt-1 text-xs text-stone-500 line-clamp-2" x-text="description"></p>
    <input x-show="editing"
           x-model="editDescription"
           @keydown.enter="saveEdits()"
           @keydown.escape="cancelEditing()"
           class="mt-1 w-full rounded border border-blue-200 bg-blue-50 px-1.5 py-0.5 text-xs text-stone-600 focus:outline-none"
           maxlength="200"
           placeholder="Description..."
           type="text" />
  </div>

  <!-- Footer: priority badge + edit hint -->
  <div class="mt-2.5 flex items-center justify-between">
    <!-- Priority selector -->
    <select x-model="priority"
            @change="updatePriority()"
            :class="{
              'bg-green-100 text-green-700': priority === 'low',
              'bg-yellow-100 text-yellow-700': priority === 'medium',
              'bg-red-100 text-red-700': priority === 'high',
            }"
            class="rounded-md border-0 px-1.5 py-0.5 text-xs font-medium cursor-pointer focus:outline-none focus:ring-1 focus:ring-blue-400">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <!-- Inline edit save/cancel controls -->
    <div x-show="editing" class="flex items-center gap-1">
      <button @click="saveEdits()" type="button"
              class="rounded px-1.5 py-0.5 text-xs bg-blue-600 text-white hover:bg-blue-700">Save</button>
      <button @click="cancelEditing()" type="button"
              class="rounded px-1.5 py-0.5 text-xs text-stone-500 hover:bg-stone-100">×</button>
    </div>
  </div>
</div>
